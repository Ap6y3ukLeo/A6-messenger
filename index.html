<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Ultra Messenger</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #0088cc; --bg: #0f172a; --chat-bg: #1e293b; --text: #f8fafc; --my-msg: #2563eb; --other-msg: #334155; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; justify-content: center; align-items: center; }
        #app { width: 100%; max-width: 500px; height: 90vh; background: var(--chat-bg); display: flex; flex-direction: column; border-radius: 20px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        header { padding: 20px; background: rgba(255,255,255,0.05); text-align: center; border-bottom: 1px solid rgba(255,255,255,0.1); }
        #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        .msg { max-width: 80%; padding: 12px 16px; border-radius: 18px; font-size: 15px; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .msg.my { align-self: flex-end; background: var(--my-msg); border-bottom-right-radius: 4px; }
        .msg.other { align-self: flex-start; background: var(--other-msg); border-bottom-left-radius: 4px; }
        .msg-info { font-size: 11px; opacity: 0.7; margin-bottom: 4px; display: block; }
        #form { padding: 20px; background: rgba(0,0,0,0.2); display: flex; gap: 10px; }
        input { background: rgba(255,255,255,0.1); border: none; color: white; padding: 12px; border-radius: 10px; outline: none; flex: 1; }
        #user { width: 80px; flex: none; }
        button { background: var(--primary); border: none; color: white; padding: 12px 20px; border-radius: 10px; cursor: pointer; font-weight: 600; }
    </style>
</head>
<body>
<div id="app">
    <header><h3 id="status">Messenger Live</h3></header>
    <div id="messages"></div>
    <form id="form">
        <input id="user" placeholder="Имя" maxlength="12">
        <input id="input" placeholder="Сообщение..." autocomplete="off">
        <button type="submit">➤</button>
    </form>
</div>
<script>
    let lastCount = 0;
    const messagesDiv = document.getElementById('messages');

    async function load() {
        try {
            const res = await fetch('/get-messages');
            const data = await res.json();
            if (data.length !== lastCount) {
                messagesDiv.innerHTML = '';
                data.forEach(m => {
                    const isMy = m.user === document.getElementById('user').value;
                    const div = document.createElement('div');
                    div.className = `msg ${isMy ? 'my' : 'other'}`;
                    div.innerHTML = `<span class="msg-info">${m.user}</span><span>${m.text}</span>`;
                    messagesDiv.appendChild(div);
                });
                messagesDiv.scrollTop = messagesDiv.scrollHeight;
                lastCount = data.length;
            }
            document.getElementById('status').innerText = "Messenger Live 🟢";
        } catch (e) {
            document.getElementById('status').innerText = "Ожидание сервера... 🟠";
        }
    }

    document.getElementById('form').onsubmit = async (e) => {
        e.preventDefault();
        const user = document.getElementById('user').value || 'Аноним';
        const text = document.getElementById('input').value;
        if (!text) return;
        await fetch('/send-message', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ user, text })
        });
        document.getElementById('input').value = '';
        load();
    };

    setInterval(load, 2000);
    load();
</script>
</body>
</html>
